<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মানসিব সিকদার ITV | লাইভ স্ট্রিমিং</title>
    
    <!-- HLS.js লাইব্রেরি (m3u8 লিঙ্ক প্লে করার জন্য) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <!-- Mixpanel রিয়েল-টাইম ট্র্যাকিং লাইব্রেরি -->

    // নিচে "YOUR_MIXPANEL_PROJECT_TOKEN" কেটে আপনার মিক্সপ্যানেল টোকেনটি বসিয়ে দিন

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #000;
            color: white;
            overflow-x: hidden;
            user-select: none; /* কোড কপি করা ব্লক */
            -webkit-user-select: none;
        }

        /* HEADER */
        .header {
            background: #000;
            padding: 12px;
            text-align: center;
            border-top: 4px solid red;
            border-bottom: 4px solid red;
        }

        .header h1 {
            font-size: 34px;
            color: white;
            text-shadow: 0 0 15px red;
        }

        .counter-box {
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 0, 0, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid red;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .counter-box span {
            font-size: 14px;
            color: #00ff00;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* PLAYER */
        .player-box {
            position: relative;
            width: 100%;
            background: black;
        }

        video {
            width: 100%;
            height: 250px;
            background: black;
            object-fit: contain;
        }

        /* CONTROLS */
        .custom-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 20px;
            z-index: 10;
            transition: opacity .5s;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            background: red;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 0 15px red;
        }

        /* SEARCH */
        .search-box {
            padding: 14px;
            background: #000;
        }

        .search-box input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            border-radius: 16px;
            border: none;
            outline: none;
            background: #111;
            color: white;
        }

        /* CHANNEL GRID */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 14px;
        }

        /* CHANNEL CARD */
        .channel {
            background: white;
            border-radius: 24px;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 120px;
            cursor: pointer;
            transition: .3s;
            border: 3px solid transparent;
            animation: borderGlow 4s linear infinite;
        }

        .channel:hover {
            transform: scale(1.05);
        }

        .channel img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }

        /* ACTIVE CHANNEL */
        .active {
            box-shadow: 
                0 0 20px red,
                0 0 40px yellow,
                0 0 60px lime;
        }

        /* GLOW ANIMATION */
        @keyframes borderGlow {
            0%, 100% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
            25% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
            50% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
            75% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            border-top: 4px solid red;
            margin-top: 20px;
        }

        .footer span {
            color: red;
        }

        /* MOBILE RESPONSIVE */
        @media(max-width: 700px){
            .channel-grid { grid-template-columns: repeat(3, 1fr); }
            .channel { height: 95px; padding: 10px; }
            .control-btn { width: 60px; height: 60px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>মানসিব সিকদার ITV</h1>
        <div class="counter-box">
            <div class="live-dot"></div>
            <span>LIVE STREAMING</span>
        </div>
    </div>

    <!-- PLAYER -->
    <div class="player-box">
        <video id="video" autoplay controls controlsList="nodownload"></video>
        
        <!-- CONTROLS -->
        <div class="custom-controls">
            <button class="control-btn" onclick="prevChannel()">⏮</button>
            <button class="control-btn" onclick="togglePlay()">⏯</button>
            <button class="control-btn" onclick="nextChannel()">⏭</button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="search" placeholder="Search Channel..." onkeyup="searchChannels()">
    </div>

    <!-- CHANNELS -->
    <div class="channel-grid" id="channelGrid"></div>

    <!-- FOOTER -->
    <div class="footer">
        © ২০২৬ <span>মানসিব সিকদার</span> | সর্বস্বত্ব সংরক্ষিত
    </div>

    <script>
        // রাইট ক্লিক ও কিবোর্ড শর্টকাট লক (কোড ও লিঙ্ক চুরি প্রতিরোধ)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        /* PLAYLIST LINK */
        const playlist = 'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

        /* VARIABLES */
        let channels = [];
        let currentIndex = 0;

        /* LOAD PLAYLIST */
        fetch(playlist)
        .then(response => response.text())
        .then(data => {
            const lines = data.split('\n');
            for(let i=0; i<lines.length; i++){
                if(lines[i].startsWith('#EXTINF')){
                    const info = lines[i];
                    const url = lines[i+1]?.trim();
                    const name = info.split(',')[1]?.trim() || "Unknown Channel";
                    let logo = '';

                    const logoMatch = info.match(/tvg-logo="(.*?)"/);
                    if(logoMatch){
                        logo = logoMatch[1];
                    }

                    if(url && url.startsWith('http')){
                        channels.push({ name, url, logo });
                    }
                }
            }
            renderChannels();
            if(channels.length > 0){
                playChannel(0);
            }
        });

        /* RENDER CHANNELS */
        function renderChannels(){
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = '';

            channels.forEach((ch, index) => {
                const div = document.createElement('div');
                div.className = 'channel';
                div.innerHTML = `<img src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://via.placeholder.com/150?text=No+Logo'">`;
                div.onclick = () => playChannel(index);
                grid.appendChild(div);
            });
        }

        /* PLAY CHANNEL */
        function playChannel(index){
            currentIndex = index;
            const video = document.getElementById('video');
            const channel = channels[index];

            document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));
            const activeCard = document.querySelectorAll('.channel')[index];
            if(activeCard) activeCard.classList.add('active');

            // Mixpanel এ কোন চ্যানেল প্লে হচ্ছে তা ট্র্যাক করার মেথড
            if(typeof mixpanel !== 'undefined') {
                mixpanel.track("Channel Played", { "Channel Name": channel.name });
            }

            if(Hls.isSupported()){
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
            }
        }

        /* NEXT CHANNEL */
        function nextChannel(){
            currentIndex++;
            if(currentIndex >= channels.length){ currentIndex = 0; }
            playChannel(currentIndex);
        }

        /* PREV CHANNEL */
        function prevChannel(){
            currentIndex--;
            if(currentIndex < 0){ currentIndex = channels.length - 1; }
            playChannel(currentIndex);
        }

        /* PLAY PAUSE */
        function togglePlay(){
            const video = document.getElementById('video');
            if(video.paused){ video.play(); } else { video.pause(); }
        }

        /* SEARCH CHANNELS */
        function searchChannels(){
            const input = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.channel');

            channels.forEach((ch, index) => {
                if(ch.name.toLowerCase().includes(input)){
                    cards[index].style.display = 'flex';
                } else {
                    cards[index].style.display = 'none';
                }
            });
        }

        /* AUTO HIDE CONTROLS */
        const controls = document.querySelector('.custom-controls');
        setTimeout(() => { controls.style.opacity = '0'; }, 5000);

        /* SHOW CONTROLS AGAIN ON CLICK */
        document.querySelector('.player-box').addEventListener('click', () => {
            controls.style.opacity = '1';
            setTimeout(() => { controls.style.opacity = '0'; }, 5000);
        });
    </script>
</body>
</html>
